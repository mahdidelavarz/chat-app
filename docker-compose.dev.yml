services:
  postgres:
    image: postgres:15-alpine
    container_name: chat-postgres-dev
    environment:
      POSTGRES_USER: node_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: chatDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - chat-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U node_user -d chatDb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: chat-backend-dev
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=node_user
      - DB_PASSWORD=123
      - DB_DATABASE=chatDb
      - DB_SYNCHRONIZE=true
      - DB_LOGGING=true
      - JWT_SECRET=dev_jwt_secret_key
      - JWT_EXPIRES_IN=7d
      - ALLOWED_ORIGINS=http://localhost:3000
      - FRONTEND_URL=http://localhost:3000
      - PORT=5000
      - HOST=0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chat-network-dev
    command: npx ts-node-dev --respawn --transpile-only src/index.ts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: chat-frontend-dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_WS_URL=ws://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - chat-network-dev
    command: npx next dev

volumes:
  postgres_data_dev:

networks:
  chat-network-dev:
    driver: bridge